// Shuffle questions
function shuffleQuestions(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Compute scores
function computeScores(answers, questions) {
  const raw = {};
  TYPES.forEach(t => raw[t.n] = { sum: 0, count: 0 });
  questions.forEach((q, i) => {
    if (answers[i] !== undefined) {
      raw[q.type].sum += answers[i];
      raw[q.type].count++;
    }
  });
  const scores = {};
  TYPES.forEach(t => {
    scores[t.n] = raw[t.n].count > 0
      ? Math.round((raw[t.n].sum / (raw[t.n].count * 10)) * 100) / 10
      : 0;
  });
  return scores;
}

function getTopTypes(scores, n = 3) {
  return [...TYPES]
    .sort((a, b) => scores[b.n] - scores[a.n])
    .slice(0, n);
}

// ENNEAGRAM SVG
// ═══════════════════════════════════════════════════════
function EnneagramSVG({ scores, dominant }) {
  const S = 320, cx = 160, cy = 160, r = 120;
  const n = 9;
  const ang = i => (Math.PI * 2 * i / n) - Math.PI / 2;
  const pt = (i, v) => ({
    x: cx + (v / 10) * r * Math.cos(ang(i)),
    y: cy + (v / 10) * r * Math.sin(ang(i))
  });
  const lp = i => ({
    x: cx + (r + 28) * Math.cos(ang(i)),
    y: cy + (r + 28) * Math.sin(ang(i))
  });

  // Inner connections of enneagram
  const connections = [[1,4],[4,2],[2,8],[8,5],[5,7],[7,1],[3,6],[6,9],[9,3]];
  const triangle = [[3,6],[6,9],[9,3]];
  const hexad = [[1,4],[4,2],[2,8],[8,5],[5,7],[7,1]];

  const gridLevels = [2,4,6,8,10];
  const grids = gridLevels.map(lv =>
    TYPES.map((_,i) => pt(i, lv)).map(p=>`${p.x},${p.y}`).join(' ')
  );

  const scorePts = TYPES.map((t,i) => {
    const p = pt(i, scores[t.n] || 0);
    return `${p.x},${p.y}`;
  }).join(' ');

  return (
    <svg width={S+60} height={S+60} viewBox={`-30 -30 ${S+60} ${S+60}`} style={{maxWidth:'100%'}}>
      {/* Grid */}
      {grids.map((g,gi) => (
        <polygon key={gi} points={g} fill="none" stroke="rgba(180,140,80,0.06)" strokeWidth="1"/>
      ))}
      {/* Axis lines */}
      {TYPES.map((_,i) => {
        const e = pt(i, 10);
        return <line key={i} x1={cx} y1={cy} x2={e.x} y2={e.y} stroke="rgba(180,140,80,0.08)" strokeWidth="1"/>;
      })}
      {/* Enneagram inner lines - hexad */}
      {hexad.map(([a,b], i) => {
        const pa = pt(a-1, 10), pb = pt(b-1, 10);
        return <line key={i} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y} stroke="rgba(180,140,80,0.06)" strokeWidth="0.5" strokeDasharray="4,4"/>;
      })}
      {/* Triangle */}
      {triangle.map(([a,b], i) => {
        const pa = pt(a-1, 10), pb = pt(b-1, 10);
        return <line key={i} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y} stroke="rgba(180,140,80,0.06)" strokeWidth="0.5" strokeDasharray="4,4"/>;
      })}
      {/* Score polygon */}
      <polygon
        points={scorePts}
        fill="rgba(180,140,80,0.08)"
        stroke="rgba(180,140,80,0.5)"
        strokeWidth="1.5"
        strokeLinejoin="round"
      />
      {/* Score dots */}
      {TYPES.map((t,i) => {
        const p = pt(i, scores[t.n] || 0);
        const isDom = dominant && dominant.n === t.n;
        return (
          <circle key={i} cx={p.x} cy={p.y} r={isDom ? 7 : 4}
            fill={isDom ? t.color : "rgba(180,140,80,0.6)"}
            stroke={isDom ? "#0C0C14" : "rgba(180,140,80,0.3)"}
            strokeWidth={isDom ? 2 : 1}
          />
        );
      })}
      {/* Labels */}
      {TYPES.map((t,i) => {
        const l = lp(i);
        const isDom = dominant && dominant.n === t.n;
        return (
          <g key={i}>
            <text x={l.x} y={l.y-6} textAnchor="middle"
              fill={isDom ? t.color : "rgba(180,140,80,0.5)"}
              fontSize={isDom ? 11 : 9}
              fontWeight={isDom ? "bold" : "normal"}
              fontFamily="Josefin Sans, sans-serif"
              letterSpacing="1"
            >{t.n}</text>
            <text x={l.x} y={l.y+5} textAnchor="middle"
              fill={isDom ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.25)"}
              fontSize="6"
              fontFamily="Josefin Sans, sans-serif"
            >{scores[t.n]||0}/10</text>
          </g>
        );
      })}
      {/* Center */}
      <circle cx={cx} cy={cy} r="3" fill="rgba(180,140,80,0.3)"/>
    </svg>
  );
}

          <div style={{flex:'0 0 auto',border:'1px solid rgba(180,140,80,0.35)',padding:16,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <EnneagramSVG scores={scores} dominant={dominant}/>
          </div>
          <div style={{flex:1,minWidth:220}}>
            <div style={{fontSize:9,letterSpacing:3,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:16}}>SCORES PAR TYPE</div>

              <div key={t.n} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'center'}}>

                  <span style={{fontSize:10,color:i<3?t.color:'rgba(255,255,255,0.68)',fontFamily:sans}}>{scores[t.n]}/10</span>
                </div>
                <div style={{height:2,background:'rgba(255,255,255,0.05)'}}>
                  <div style={{height:'100%',background:i<3?t.color:'rgba(255,255,255,0.55)',width:`${(scores[t.n]/10)*100}%`,transition:'width 1s ease'}}/>

              {t:dominant, label:'TYPE DOMINANT', rank:1},
              {t:second, label:'AILE / SECONDAIRE', rank:2},
              {t:third, label:'INFLUENCE TERTIAIRE', rank:3},
            ].map(({t,label,rank}) => t && (
              <div key={t.n} style={{
                border:`1px solid ${rank===1?t.color:'rgba(180,140,80,0.35)'}`,
                padding:'16px 14px',
                background:rank===1?`${t.color}06`:'transparent',
                borderRadius:2
              }}>
                <div style={{fontSize:8,letterSpacing:2,color:rank===1?t.color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:8}}>{label}</div>
                <div style={{fontSize:22,marginBottom:6}}>{t.symbol}</div>
                <div style={{fontSize:10,letterSpacing:3,color:t.color,fontFamily:sans,marginBottom:2}}>TYPE {t.n}</div>
                <div style={{fontSize:12,fontFamily:serif,color:'rgba(255,255,255,0.7)',marginBottom:4}}>{t.name}</div>
                <div style={{fontSize:9,color:'rgba(200,168,75,0.75)',fontFamily:sans}}>{scores[t.n]}/10</div>

            {key:'corps', label:'CORPS & ÉNERGIE', icon:'💚'},
            {key:'stress', label:'STRESS & VULNÉRABILITÉS', icon:'⚡'},

            <div key={d.key} style={{
              borderLeft:`2px solid ${dominant.color}`,
              paddingLeft:16,
              paddingTop:12,
              paddingBottom:12,
              marginBottom:12,
              background:'rgba(255,255,255,0.05)',

              <p style={{fontSize:13,fontFamily:serif,color:'rgba(255,255,255,0.88)',lineHeight:1.7}}>
                {dominant.domaines[d.key]}

        {/* Dynamiques */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:32}}>
          <div style={{border:'1px solid rgba(180,140,80,0.35)',padding:16}}>
            <div style={{fontSize:9,letterSpacing:2,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:10}}>SOUS STRESS → TYPE {dominant.desintegration}</div>
            <div style={{fontSize:12,fontFamily:serif,color:'rgba(255,130,130,0.9)',lineHeight:1.6}}>{dominant.stress}</div>
          </div>
          <div style={{border:'1px solid rgba(180,140,80,0.35)',padding:16}}>
            <div style={{fontSize:9,letterSpacing:2,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:10}}>EN CROISSANCE → TYPE {dominant.integration}</div>
            <div style={{fontSize:12,fontFamily:serif,color:'rgba(100,220,160,0.9)',lineHeight:1.6}}>{dominant.growth}</div>
          </div>
        </div>

        {/* Wings */}
        <div style={{border:'1px solid rgba(180,140,80,0.35)',padding:20,marginBottom:32}}>
          <div style={{fontSize:9,letterSpacing:3,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:10}}>AILES POSSIBLES</div>
          <div style={{display:'flex',gap:12}}>
            {dominant.wings.map(w => {
              const wt = TYPES.find(t=>t.n===w);
              return (
                <div key={w} style={{flex:1,textAlign:'center',padding:'12px 8px',background:`${wt.color}08`,border:`1px solid ${wt.color}30`}}>
                  <div style={{fontSize:16,marginBottom:4}}>{wt.symbol}</div>
                  <div style={{fontSize:9,letterSpacing:2,color:wt.color,fontFamily:sans}}>AILE {w}</div>
                  <div style={{fontSize:11,fontFamily:serif,color:'rgba(255,255,255,0.95)',marginTop:2}}>{wt.name}</div>
                  <div style={{fontSize:10,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginTop:2}}>Score: {scores[w]}/10</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Core dynamics */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom:32}}>
          {[
            {label:'MOTIVATION PROFONDE', val:dominant.motivation, color:'rgba(180,140,80,0.6)'},
            {label:'PEUR FONDAMENTALE', val:dominant.peur, color:'rgba(192,57,43,0.6)'},
            {label:'DÉSIR PROFOND', val:dominant.desir, color:'rgba(39,174,96,0.6)'},
            {label:'VICE / PASSION', val:dominant.vice, color:'rgba(142,68,173,0.6)'},
            {label:'VERTU / ESSENCE', val:dominant.vertu, color:'rgba(180,140,80,0.6)'},
            {label:'ESSENCE', val:dominant.essence, color:'rgba(26,188,156,0.6)'},
          ].map(d => (
            <div key={d.label} style={{borderBottom:`1px solid ${'rgba(180,140,80,0.35)'}`,paddingBottom:12,paddingTop:4}}>
              <div style={{fontSize:8,letterSpacing:2,color:d.color,fontFamily:sans,marginBottom:6}}>{d.label}</div>
              <p style={{fontSize:12,fontFamily:serif,color:'rgba(255,255,255,0.6)',lineHeight:1.6}}>{d.val}</p>
            </div>
          ))}
        </div>

        {/* BILAN PERCUTANT */}
        <div style={{
          border:`1px solid ${dominant.color}`,
          padding:'28px 24px',
          marginBottom:24,
          background:`${dominant.color}05`,
          position:'relative'
        }}>
          <div style={{
            position:'absolute',top:-10,left:20,
            background:'#0C0C14',
            padding:'0 12px',
            fontSize:9,letterSpacing:3,color:dominant.color,fontFamily:sans
          }}>BILAN SOMMAIRE</div>
          <p style={{fontSize:16,fontFamily:serif,fontStyle:'italic',fontWeight:300,color:'rgba(255,255,255,0.92)',lineHeight:1.9}}>
            {dominant.bilan}
          </p>
        </div>

        {/* Outils QIVIVA recommandés */}
        <div style={{marginBottom:24,border:'1px solid rgba(180,140,80,0.35)',padding:'20px'}}>
          <div style={{fontSize:9,letterSpacing:3,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:14}}>ACCOMPAGNEMENT QIVIVA RECOMMANDÉ</div>
          {dominant.center === 'tête' && (
            <p style={{fontSize:12,fontFamily:serif,color:'rgba(255,255,255,0.95)',lineHeight:1.8}}>
              Centre mental dominant · <strong style={{color:C.goldLight}}>Cohérence cardiaque</strong> pour ancrer le mental dans le corps ·
              <strong style={{color:C.goldLight}}> Psych-K®</strong> pour reprogrammer les croyances anxieuses ·
              <strong style={{color:C.goldLight}}> Sophrologie</strong> pour calmer le flot des pensées
            </p>
          )}
          {dominant.center === 'cœur' && (
            <p style={{fontSize:12,fontFamily:serif,color:'rgba(255,255,255,0.95)',lineHeight:1.8}}>
              Centre émotionnel dominant · <strong style={{color:C.goldLight}}>Kinésiologie</strong> pour libérer les charges émotionnelles ·
              <strong style={{color:C.goldLight}}> Psych-K®</strong> pour travailler l'image de soi ·
              <strong style={{color:C.goldLight}}> Hypnose</strong> pour accéder aux besoins profonds
            </p>
          )}
          {dominant.center === 'instinct' && (
            <p style={{fontSize:12,fontFamily:serif,color:'rgba(255,255,255,0.95)',lineHeight:1.8}}>
              Centre instinctif dominant · <strong style={{color:C.goldLight}}>Techniques respiratoires</strong> pour réguler l'énergie vitale ·
              <strong style={{color:C.goldLight}}> Kinésiologie</strong> pour libérer les tensions corporelles ·
              <strong style={{color:C.goldLight}}> Cohérence cardiaque</strong> pour canaliser l'intensité
            </p>
          )}
        </div>

        {/* Send + Calendly */}
        <div style={{border:'1px solid rgba(180,140,80,0.35)',padding:24,marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:3,color:'rgba(200,168,75,0.75)',fontFamily:sans,marginBottom:12}}>📩 RECEVOIR MON PROFIL COMPLET</div>
          {!sent ? (
            <div>
              <button onClick={sendReport} style={{
                width:'100%',padding:'14px',background:'transparent',
                border:`1px solid ${dominant.color}`,
                color:dominant.color,fontSize:10,fontFamily:sans,letterSpacing:3,
                transition:'all 0.2s'
              }}>
                ENVOYER MON PROFIL À DAVID GARCIA →
              </button>
            </div>
          ) : (
            <div style={{textAlign:'center',padding:'12px 0'}}>
              <div style={{fontSize:20,marginBottom:6}}>✓</div>
              <div style={{fontSize:10,color:'rgba(100,200,150,0.8)',letterSpacing:3,fontFamily:sans}}>PROFIL ENVOYÉ</div>
              <div style={{fontSize:11,fontFamily:serif,fontStyle:'italic',color:'rgba(255,255,255,0.92)',marginTop:4}}>David Garcia vous contactera dans les 48h.</div>
            </div>
          )}
        </div>

        <a href="https://calendly.com/dvdk7381" target="_blank" style={{
          display:'block',padding:'14px',
          border:'1px solid rgba(180,140,80,0.35)',
          color:C.goldLight,fontSize:10,fontFamily:sans,letterSpacing:3,
          textDecoration:'none',textAlign:'center',marginBottom:16,
          transition:'all 0.2s'
        }}>
          📅 RÉSERVER UN ENTRETIEN DE DÉCODAGE →
        </a>

        <div style={{display:'flex',gap:10,marginBottom:24}}>
          <a href="https://www.qiviva.net" target="_blank" style={{flex:1,padding:'11px',border:'1px solid rgba(180,140,80,0.35)',color:'rgba(200,168,75,0.75)',fontSize:9,letterSpacing:2,textDecoration:'none',textAlign:'center',fontFamily:sans}}>
            QIVIVA.NET
          </a>
          <button onClick={reset} style={{flex:1,padding:'11px',background:'transparent',border:`1px solid rgba(255,255,255,0.06)`,color:'rgba(255,255,255,0.68)',fontSize:9,letterSpacing:2,fontFamily:sans}}>
            RECOMMENCER
          </button>
        </div>

        <div style={{textAlign:'center',fontSize:8,color:'rgba(180,140,80,0.12)',letterSpacing:2,fontFamily:sans,marginBottom:24}}>
          © DAVID GARCIA · RADAR DE PERSONNALITÉ · TOUS DROITS RÉSERVÉS
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
